<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мультимедийный Портал</title>
    <style>
        /* Базовые настройки для плавного перехода цветов */
        :root {
            --main-color: #1e3a8a; /* Цвет по умолчанию (Фильмы) */
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-color: #f8fafc;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            /* Благодаря этому свойству всё будет перекрашиваться плавно */
            transition: background-color 0.5s ease, color 0.5s ease;
        }

        /* Шапка сайта */
        header {
            background-color: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 2px solid var(--main-color);
            transition: border-color 0.5s ease;
            padding: 15px 20px;
        }

        .nav-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1200px;
            margin: 0 auto;
            flex-wrap: wrap;
            gap: 15px;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .logo span {
            color: var(--main-color);
            transition: color 0.5s ease;
        }

        /* Меню переключения разделов */
        nav {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .nav-btn {
            background: transparent;
            border: 2px solid transparent;
            color: #94a3b8;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .nav-btn:hover {
            color: var(--text-color);
            background-color: rgba(255, 255, 255, 0.05);
        }

        /* Активная кнопка подсвечивается своим цветом */
        .nav-btn.active {
            background-color: var(--main-color);
            color: white;
            box-shadow: 0 4px 15px var(--main-color);
        }

        /* Сетка для карточек контента */
        main {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .section-title {
            font-size: 28px;
            margin-bottom: 20px;
            border-left: 5px solid var(--main-color);
            padding-left: 15px;
            transition: border-color 0.5s ease;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 25px;
        }

        /* Карточка релиза */
        .card {
            background-color: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            position: relative;
        }

        .card:hover {
            transform: translateY(-8px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3), 0 0 15px var(--main-color);
        }

        .card-poster {
            height: 300px;
            background: linear-gradient(45deg, #334155, #475569);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #94a3b8;
            font-size: 14px;
        }

        .card-info {
            padding: 15px;
        }

        .card-title {
            font-size: 16px;
            font-weight: bold;
            margin: 0 0 8px 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .card-tag {
            display: inline-block;
            font-size: 12px;
            padding: 3px 8px;
            border-radius: 4px;
            background-color: var(--main-color);
            color: white;
            transition: background-color 0.5s ease;
        }
    </style>
</head>
<body>

    <header>
        <div class="nav-container">
            <div class="logo">KAI<span>Media</span></div>
            <nav id="main-nav">
                <!-- Каждой кнопке задаем ее уникальный цвет в data-color -->
                <button class="nav-btn active" data-type="movies" data-color="#1e4a8a" data-name="Фильмы">Фильмы</button>
                <button class="nav-btn" data-type="series" data-color="#475569" data-name="Сериалы">Сериалы</button>
                <button class="nav-btn" data-type="cartoons" data-color="#06b6d4" data-name="Мультики">Мультики</button>
                <<a href="dramas.html" style="text-decoration: none;">
    <button class="nav-btn" data-type="dramas" data-color="#ec4899" data-name="Дорамы">Дорамы</button>
</a>>
                <button class="nav-btn" data-type="anime" data-color="#f97316" data-name="Аниме">Аниме</button>
                <button class="nav-btn" data-type="donghua" data-color="#10b981" data-name="Дунхуа">Дунхуа</button>
                <button class="nav-btn" data-type="novels" data-color="#b45309" data-name="Новеллы">Новеллы</button>
                <button class="nav-btn" data-type="manhwa" data-color="#8b5cf6" data-name="Манхва">Манхва</button>
            </nav>
        </div>
    </header>

    <main>
        <h2 class="section-title" id="current-section-title">Популярные Фильмы</h2>
        
        <!-- Сетка с карточками, которые будут меняться -->
        <div class="grid" id="content-grid">
            <!-- Карточки сгенерируются автоматически через JavaScript -->
        </div>
    </main>

    <script>
        const buttons = document.querySelectorAll('.nav-btn');
        const sectionTitle = document.getElementById('current-section-title');
        const contentGrid = document.getElementById('content-grid');

        // Функция для создания тестовых карточек
        function generateCards(type, count = 8) {
            contentGrid.innerHTML = '';
            for (let i = 1; i <= count; i++) {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div class="card-poster">Постер #${i}</div>
                    <div class="card-info">
                        <p class="card-title">Пример релиза #${i}</p>
                        <span class="card-tag">${type}</span>
                    </div>
                `;
                contentGrid.appendChild(card);
            }
        }

        // Логика переключения тем и разделов
        buttons.forEach(button => {
            button.addEventListener('click', () => {
                // Убираем активный класс у всех кнопок и добавляем текущей
                buttons.forEach(btn => btn.classList.remove('active'));
                button.classList.add('active');

                // Получаем данные из кнопки
                const targetColor = button.getAttribute('data-color');
                const sectionName = button.getAttribute('data-name');
                const typeName = button.innerText;

                // Меняем CSS переменную (магия плавной смены цвета)
                document.documentElement.style.setProperty('--main-color', targetColor);
                
                // Меняем заголовок
                sectionTitle.innerText = `Популярные ${sectionName}`;

                // Обновляем карточки под выбранный тип
                generateCards(typeName);
            });
        });

        // Первичная генерация карточек при загрузке сайта (для Фильмов)
        generateCards('Фильмы');
    </script>
</body>
</html>
